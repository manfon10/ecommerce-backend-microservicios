name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'

jobs:
  install:
    name: Install (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog-service, orders-service, api-gateway, ecommerce-app]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci --prefer-offline

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ${{ matrix.service }}/node_modules
          key: ${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('{0}/package-lock.json', matrix.service)) }}

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      matrix:
        service: [catalog-service, orders-service, api-gateway, ecommerce-app]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: ${{ matrix.service }}/node_modules
          key: ${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('{0}/package-lock.json', matrix.service)) }}

      - name: Build service
        working-directory: ${{ matrix.service }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.service }}
          path: ${{ matrix.service }}/dist
          retention-days: 1

  version-bump:
    name: Version bump
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      bump_type: ${{ steps.bump.outputs.bump_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Detect bump type and apply
        id: bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" | head -30)
          else
            COMMITS=$(git log "$LAST_TAG..HEAD" --pretty=format:"%s")
          fi

          echo "Commits since last tag:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^.+!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          echo "Bump type: $BUMP"

          for SERVICE in catalog-service orders-service api-gateway ecommerce-app; do
            cd $SERVICE && npm version $BUMP --no-git-tag-version && cd ..
          done

          NEW_VERSION=$(node -p "require('./catalog-service/package.json').version")
          echo "New version: $NEW_VERSION"

          git add .
          git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --follow-tags

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP"         >> $GITHUB_OUTPUT

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: version-bump
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write CHANGELOG.md
        env:
          NEW_VERSION: ${{ needs.version-bump.outputs.new_version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main

          DATE=$(date +%Y-%m-%d)

          PREV_TAG=$(git describe --tags --abbrev=0 "v$NEW_VERSION^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            ALL_COMMITS=$(git log --pretty=format:"%s" | grep -v "\[skip ci\]")
          else
            ALL_COMMITS=$(git log "$PREV_TAG..v$NEW_VERSION" --pretty=format:"%s" | grep -v "\[skip ci\]")
          fi

          FEATURES=$(echo   "$ALL_COMMITS" | grep "^feat"      | sed 's/^feat[^:]*: /- /') || true
          FIXES=$(echo      "$ALL_COMMITS" | grep "^fix"       | sed 's/^fix[^:]*: /- /') || true
          REFACTORS=$(echo  "$ALL_COMMITS" | grep "^refactor"  | sed 's/^refactor[^:]*: /- /') || true
          DOCS=$(echo       "$ALL_COMMITS" | grep "^docs"      | sed 's/^docs[^:]*: /- /') || true
          CHORES=$(echo     "$ALL_COMMITS" | grep "^chore"     | sed 's/^chore[^:]*: /- /' | grep -v "bump version") || true
          OTHERS=$(echo     "$ALL_COMMITS" | grep -vE "^(feat|fix|refactor|docs|chore)" | sed 's/^/- /') || true

          ENTRY="## [v$NEW_VERSION] - $DATE\n"
          [ -n "$FEATURES"  ] && ENTRY="${ENTRY}\n### Features\n${FEATURES}\n"
          [ -n "$FIXES"     ] && ENTRY="${ENTRY}\n### Bug fixes\n${FIXES}\n"
          [ -n "$REFACTORS" ] && ENTRY="${ENTRY}\n### Refactors\n${REFACTORS}\n"
          [ -n "$DOCS"      ] && ENTRY="${ENTRY}\n### Docs\n${DOCS}\n"
          [ -n "$CHORES"    ] && ENTRY="${ENTRY}\n### Chores\n${CHORES}\n"
          [ -n "$OTHERS"    ] && ENTRY="${ENTRY}\n### Other\n${OTHERS}\n"

          if [ -f CHANGELOG.md ]; then
            echo -e "$ENTRY\n---\n\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n---\n\n$ENTRY" > CHANGELOG.md
          fi

          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG for v$NEW_VERSION [skip ci]"
          git push origin main